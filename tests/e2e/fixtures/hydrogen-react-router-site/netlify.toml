[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "24"

[dev]
  command = "npm run dev"

# Set immutable caching for static files, because they have fingerprinted filenames
[[headers]]
for = "/assets/*"
[headers.values]
"Cache-Control" = "public, max-age=31560000, immutable"

# These are only used to set up the template, and are not used by your project.
# You can safely delete this section.
# If you want to update the real values, change them in the Netlify app or via the Netlify CLI.
[template.environment]
PUBLIC_STORE_DOMAIN = "Store domain - set this to 'mock.shop' to try the demo site"
SESSION_SECRET = "Session secret - set this to a random value for production"
